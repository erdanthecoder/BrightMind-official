<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrightMind 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Roboto',Arial,sans-serif;background:linear-gradient(135deg,#1a237e,#7b1fa2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{font-size:3.5rem;display:block;margin-bottom:10px}
h1{font-size:2rem;font-weight:700;color:#202124;margin-bottom:6px}
h1 em{color:#1a73e8;font-style:normal}
p{color:#5f6368;margin-bottom:30px;font-size:.95rem}
.btns{display:flex;gap:12px;flex-direction:column}
a.btn{padding:16px;border-radius:8px;text-decoration:none;font-size:.95rem;font-weight:600;display:block;transition:all .2s}
a.teacher{background:#1a73e8;color:#fff}
a.student{background:#0f9d58;color:#fff}
a.btn:hover{opacity:.88;transform:translateY(-2px)}
.note{margin-top:20px;background:#f8f9ff;border-radius:8px;padding:14px;font-size:.82rem;color:#5f6368}
</style>
</head>
<body>
<div class="card">
  <span class="logo">🌟</span>
  <h1>Bright<em>Mind</em></h1>
  <p>Kids Learning Platform — choose your role</p>
  <div class="btns">
    <a class="btn teacher" href="/teacher">👩‍🏫 Teacher Dashboard</a>
    <a class="btn student" href="/student">🧒 Student App</a>
  </div>
  <div class="note">Students can join from any device — no app needed! Just open the Student App link.</div>
</div>
</body>
</html>
